<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter - Supertool</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 800px; }
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: #667eea; background: #f0f2ff; }
        .drop-zone input[type="file"] {
            position: absolute; inset: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }
        .drop-zone .icon { font-size: 3rem; margin-bottom: 10px; }
        .drop-zone p { color: #666; font-size: 0.9rem; margin: 4px 0; }
        .preview-area { display: none; flex-direction: column; align-items: center; gap: 10px; }
        .preview-area img { max-height: 200px; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .preview-info { font-size: 0.85rem; color: #555; text-align: center; }
        .remove-btn { font-size: 0.85rem; color: #ef4444; cursor: pointer; background: none; border: none; font-weight: 600; }
        .remove-btn:hover { color: #b91c1c; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 20px; }
        @media (max-width: 520px) { .settings-grid { grid-template-columns: 1fr; } }

        .format-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .format-option { display: none; }
        .format-label {
            display: flex; align-items: center; justify-content: center;
            padding: 10px; border: 1px solid #ccc; border-radius: 6px;
            cursor: pointer; font-size: 0.9rem; font-weight: 600;
            transition: border-color 0.2s, background 0.2s, color 0.2s;
        }
        .format-option:checked + .format-label {
            border-color: #667eea; background: #eef0ff; color: #667eea;
        }

        .quality-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        input[type="range"] { width: 100%; accent-color: #667eea; }

        .size-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .size-row input { padding: 8px; font-size: 14px; }

        .result-section { display: none; margin-top: 28px; padding-top: 24px; border-top: 1px solid #eee; }
        .result-section h3 { margin-bottom: 16px; color: #333; }
        .result-layout { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
        .result-preview-box {
            flex: 1; min-width: 200px; background: #f5f5f5; border: 1px solid #e0e0e0;
            border-radius: 8px; padding: 16px; display: flex; align-items: center; justify-content: center;
        }
        .result-preview-box img { max-height: 200px; max-width: 100%; object-fit: contain; border-radius: 4px; }
        .result-actions { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 12px; }
        .result-meta { background: #eef0ff; border: 1px solid #c7d2fe; border-radius: 6px; padding: 12px; font-size: 0.88rem; color: #4338ca; }

        .btn-download { background: #22c55e; text-align: center; display: block; padding: 12px; border-radius: 5px; color: white; font-weight: 600; text-decoration: none; transition: background 0.2s; }
        .btn-download:hover { background: #16a34a; }
        .btn-reset { background: white; border: 1px solid #ccc; color: #555; margin-top: 0; }
        .btn-reset:hover { background: #f5f5f5; }

        .opacity-50 { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">Supertool</a>
            <nav><a href="index.html">Tools</a></nav>
        </div>
    </header>

    <div class="container">
        <div class="tool-card">
            <h1>Image Converter</h1>
            <p class="description">Convert, resize, and optimize images in your browser. Supports PNG, JPG, WebP. No upload needed — fully client-side.</p>

            <!-- Drop zone -->
            <label style="margin-top:0">Upload Image</label>
            <div class="drop-zone" id="dropZone">
                <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp,image/gif">
                <div id="uploadPlaceholder">
                    <div class="icon">🖼️</div>
                    <p><strong>Drag and drop</strong> or click to upload</p>
                    <p>PNG, JPG, WEBP, GIF up to 10MB</p>
                </div>
                <div class="preview-area" id="previewArea">
                    <img id="previewImg" src="" alt="Preview">
                    <div class="preview-info" id="previewInfo"></div>
                    <button class="remove-btn" id="removeBtn" type="button">Remove</button>
                </div>
            </div>

            <div class="settings-grid">
                <!-- Format -->
                <div>
                    <label style="margin-top:0">Target Format</label>
                    <div class="format-grid">
                        <span>
                            <input type="radio" class="format-option" name="format" id="fmt-jpeg" value="jpeg" checked>
                            <label class="format-label" for="fmt-jpeg">JPG</label>
                        </span>
                        <span>
                            <input type="radio" class="format-option" name="format" id="fmt-png" value="png">
                            <label class="format-label" for="fmt-png">PNG</label>
                        </span>
                        <span>
                            <input type="radio" class="format-option" name="format" id="fmt-webp" value="webp">
                            <label class="format-label" for="fmt-webp">WebP</label>
                        </span>
                    </div>
                </div>

                <!-- Settings -->
                <div>
                    <div id="qualityControl">
                        <div class="quality-row">
                            <label style="margin-top:0">Quality</label>
                            <span id="qualityVal" style="font-size:0.85rem;color:#666">90%</span>
                        </div>
                        <input type="range" id="qualityRange" min="1" max="100" value="90">
                    </div>

                    <label>Resize (optional)</label>
                    <div class="size-row">
                        <input type="number" id="widthInput" placeholder="Width px" min="1">
                        <input type="number" id="heightInput" placeholder="Height px" min="1">
                    </div>
                </div>
            </div>

            <div class="error" id="errorMsg" style="display:none"></div>

            <button class="btn" id="convertBtn" onclick="convertImage()">Convert Image</button>

            <!-- Result -->
            <div class="result-section" id="resultSection">
                <h3>Conversion Complete!</h3>
                <div class="result-layout">
                    <div class="result-preview-box">
                        <img id="resultImg" src="" alt="Result">
                    </div>
                    <div class="result-actions">
                        <div class="result-meta" id="resultMeta"></div>
                        <a id="downloadLink" href="#" class="btn-download">⬇ Download Image</a>
                        <button class="btn btn-reset" onclick="resetConverter()">Convert Another</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const previewArea = document.getElementById('previewArea');
        const previewImg = document.getElementById('previewImg');
        const previewInfo = document.getElementById('previewInfo');
        const removeBtn = document.getElementById('removeBtn');
        const qualityRange = document.getElementById('qualityRange');
        const qualityVal = document.getElementById('qualityVal');
        const qualityControl = document.getElementById('qualityControl');
        const errorMsg = document.getElementById('errorMsg');
        const convertBtn = document.getElementById('convertBtn');
        const resultSection = document.getElementById('resultSection');

        let currentFile = null;
        let currentObjectUrl = null;

        qualityRange.addEventListener('input', () => qualityVal.textContent = qualityRange.value + '%');

        document.querySelectorAll('input[name="format"]').forEach(r => r.addEventListener('change', updateQualityVisibility));
        function updateQualityVisibility() {
            const fmt = document.querySelector('input[name="format"]:checked').value;
            qualityControl.classList.toggle('opacity-50', fmt === 'png');
        }

        function loadFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                showError('Please select a valid image file.');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showError('File size must be under 10MB.');
                return;
            }
            currentFile = file;
            const url = URL.createObjectURL(file);
            previewImg.src = url;
            previewInfo.textContent = `${file.name} · ${(file.size / 1024).toFixed(1)} KB`;
            uploadPlaceholder.style.display = 'none';
            previewArea.style.display = 'flex';
            errorMsg.style.display = 'none';
            resultSection.style.display = 'none';
        }

        imageInput.addEventListener('change', e => loadFile(e.target.files[0]));
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                imageInput.files = e.dataTransfer.files;
                loadFile(e.dataTransfer.files[0]);
            }
        });
        removeBtn.addEventListener('click', e => {
            e.stopPropagation();
            currentFile = null;
            imageInput.value = '';
            previewImg.src = '';
            previewArea.style.display = 'none';
            uploadPlaceholder.style.display = 'block';
            resultSection.style.display = 'none';
        });

        async function convertImage() {
            if (!currentFile) {
                showError('Please select an image first.');
                return;
            }
            const format = document.querySelector('input[name="format"]:checked').value;
            const quality = parseInt(qualityRange.value) / 100;
            const width = parseInt(document.getElementById('widthInput').value) || 0;
            const height = parseInt(document.getElementById('heightInput').value) || 0;

            errorMsg.style.display = 'none';
            convertBtn.disabled = true;
            convertBtn.textContent = 'Converting...';

            try {
                const blob = await doConvert(currentFile, format, quality, width, height);
                if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
                currentObjectUrl = URL.createObjectURL(blob);

                const ext = format === 'jpeg' ? 'jpg' : format;
                document.getElementById('resultImg').src = currentObjectUrl;
                document.getElementById('downloadLink').href = currentObjectUrl;
                document.getElementById('downloadLink').download = `converted.${ext}`;
                document.getElementById('resultMeta').textContent =
                    `${(blob.size / 1024).toFixed(1)} KB · ${format.toUpperCase()}`;
                resultSection.style.display = 'block';
                resultSection.scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                showError('Conversion failed: ' + e.message);
            } finally {
                convertBtn.disabled = false;
                convertBtn.textContent = 'Convert Image';
            }
        }

        function doConvert(file, format, quality, targetW, targetH) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    let w = img.naturalWidth;
                    let h = img.naturalHeight;

                    if (targetW && targetH) { w = targetW; h = targetH; }
                    else if (targetW) { h = Math.round(h * (targetW / w)); w = targetW; }
                    else if (targetH) { w = Math.round(w * (targetH / h)); h = targetH; }

                    const canvas = document.createElement('canvas');
                    canvas.width = w;
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');

                    if (format === 'jpeg') {
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, w, h);
                    }

                    ctx.drawImage(img, 0, 0, w, h);

                    const mime = format === 'jpeg' ? 'image/jpeg' : format === 'png' ? 'image/png' : 'image/webp';
                    canvas.toBlob(blob => {
                        if (blob) resolve(blob);
                        else reject(new Error('Canvas conversion returned null.'));
                    }, mime, quality);
                };
                img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Failed to load image.')); };
                img.src = url;
            });
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        function resetConverter() {
            removeBtn.click();
            resultSection.style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
